<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống So Sánh Bất Động Sản NKS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4f7f6; }
        .theme-bg { background-color: #0077bb; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900">Hệ thống Đối Chiếu & So Sánh BĐS</h1>
                <p class="text-gray-500 mt-1">Dữ liệu thời gian thực được đồng bộ từ hệ thống dữ liệu sạch NKS</p>
            </div>
            <div class="mt-4 md:mt-0">
                <button id="compareBtn" class="theme-bg text-white font-bold px-6 py-3 rounded-lg shadow-md hover:bg-blue-700 transition cursor-pointer hidden">
                    📊 Xem Bảng So Sánh (<span id="compareCount">0</span>)
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row gap-3 items-center">
            <span class="font-bold text-gray-700 whitespace-nowrap">Nguồn cổng dữ liệu:</span>
            <div id="statusIndicator" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-green-700 font-semibold">
                🟢 Đang chờ kết nối...
            </div>
            <button id="loadApiBtn" class="bg-gray-800 text-white font-semibold px-4 py-2 rounded-lg hover:bg-gray-900 cursor-pointer text-sm whitespace-nowrap">Đồng_Bộ_Lại</button>
        </div>

        <h2 class="text-xl font-bold text-gray-800 mb-4">🏠 Danh sách Bất Động Sản khả dụng</h2>
        <div id="propertiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="col-span-full text-center py-12 text-gray-500 font-medium">Nhấn "Đồng bộ lại" để lấy dữ liệu.</div>
        </div>

        <div id="comparisonSection" class="bg-white rounded-xl shadow-lg p-6 overflow-hidden hidden border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-900 flex items-center gap-2">📊 Bảng Đối Chiếu Thông Số Chi Tiết</h2>
                <button id="closeCompareBtn" class="text-gray-400 hover:text-gray-600 text-sm font-semibold">❌ Đóng bảng</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-200">
                    <thead><tr id="tableHead" class="bg-gray-50 text-gray-700"></tr></thead>
                    <tbody id="tableBody" class="text-gray-600 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allProperties = [];
        let selectedIds = [];

        // Thay thế hàm fetchProperties cũ bằng đoạn này:
async function fetchProperties() {
    const grid = document.getElementById('propertiesGrid');
    const status = document.getElementById('statusIndicator');
    
    try {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">Đang đồng bộ qua Proxy...</div>`;
        
        // Gọi về chính server Vercel của bạn, tránh lỗi CORS
        const response = await fetch('/api/proxy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({}) // Nếu cần gửi thêm params, điền vào đây
        });

        if (!response.ok) throw new Error('Kết nối Proxy thất bại');

        const data = await response.json();

        // Gán dữ liệu vào biến toàn cục
        allProperties = data; 
        
        if (status) status.innerText = "🟢 Đồng bộ thành công";
        renderProperties();
    } catch (error) {
        if (status) status.innerText = "🔴 Lỗi kết nối";
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-500">
            Lỗi đồng bộ: ${error.message}. 
            (Proxy đã được thiết lập, hãy đảm bảo bạn đã Push code lên Git để Vercel cập nhật serverless function).
        </div>`;
    }
}

        // --- CÁC HÀM RENDER (Giữ nguyên logic của bạn) ---
        function renderProperties() { /* Giữ nguyên hàm render cũ */ }
        function toggleSelect(id) { /* Giữ nguyên hàm toggle cũ */ }
        function generateCompareTable() { /* Giữ nguyên hàm compare cũ */ }

        // Event Listeners
        document.getElementById('compareBtn').addEventListener('click', () => {
            document.getElementById('comparisonSection').classList.remove('hidden');
            generateCompareTable();
        });
        document.getElementById('closeCompareBtn').addEventListener('click', () => document.getElementById('comparisonSection').classList.add('hidden'));
        document.getElementById('loadApiBtn').addEventListener('click', fetchProperties);
        window.onload = fetchProperties;
    </script>
</body>
</html>
