<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKS — Hệ thống So Sánh Bất Động Sản</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:      #0077bb;
            --blue-dk:   #005a8e;
            --blue-lt:   #e8f4fd;
            --blue-mid:  #cce4f6;
            --gold:      #c9993a;
            --text:      #0d1b2a;
            --text-2:    #2d4157;
            --muted:     #6b8094;
            --border:    #dde6ee;
            --bg:        #f5f8fb;
            --white:     #ffffff;
            --shadow:    0 2px 12px rgba(0,119,187,.08);
            --shadow-lg: 0 12px 48px rgba(0,0,0,.10);
            --r:         12px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1360px; margin: auto;
            padding: 0 clamp(16px,4vw,48px);
            height: 62px;
            display: flex; align-items: center; gap: 16px;
        }

        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-mark {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--blue);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -1px;
        }
        .logo-name { font-size: 15px; font-weight: 600; color: var(--text); }
        .logo-sub  { font-size: 11px; color: var(--muted); font-weight: 400; }

        .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

        .status-pill {
            display: flex; align-items: center; gap: 7px;
            padding: 5px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 12px; color: var(--muted); font-weight: 500;
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,.2);
            flex-shrink: 0;
        }
        .status-dot.loading { background: var(--gold); box-shadow: 0 0 0 3px rgba(201,153,58,.2); animation: pulse .9s infinite; }
        .status-dot.error   { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.2); animation: none; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border-radius: 8px;
            font-family: inherit; font-size: 13px; font-weight: 600;
            cursor: pointer; border: none; transition: all .18s;
            text-decoration: none; white-space: nowrap;
        }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: var(--blue-dk); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,119,187,.3); }
        .btn-ghost { background: var(--white); color: var(--text-2); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); border-color: var(--blue); color: var(--blue); }
        .btn-compare { background: var(--blue); color: #fff; }
        .btn-compare:hover { background: var(--blue-dk); }

        .compare-badge {
            background: var(--gold); color: #fff;
            border-radius: 999px; padding: 1px 7px;
            font-size: 11px; font-weight: 700;
        }

        /* ── MAIN ── */
        main {
            max-width: 1360px; margin: auto;
            padding: clamp(20px,4vw,48px) clamp(16px,4vw,48px);
        }

        /* ── TOOLBAR ── */
        .toolbar {
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap; margin-bottom: 28px;
        }

        .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); pointer-events: none;
            width: 15px; height: 15px;
        }
        .search-input {
            width: 100%; padding: 9px 12px 9px 36px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 13px; font-family: inherit; color: var(--text);
            background: var(--white); outline: none; transition: all .18s;
        }
        .search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,119,187,.10); }

        .filter-select {
            padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 13px; font-family: inherit; color: var(--text-2);
            background: var(--white); cursor: pointer; outline: none; transition: all .18s;
            min-width: 140px;
        }
        .filter-select:focus { border-color: var(--blue); }

        .result-count { margin-left: auto; font-size: 13px; color: var(--muted); }
        .result-count strong { color: var(--blue); font-weight: 700; }

        /* ── COMPARE PANEL ── */
        .compare-panel {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: var(--shadow);
            display: none;
        }
        .compare-panel.visible { display: block; animation: slideDown .3s ease; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

        .compare-panel-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; border-bottom: 2px solid var(--border);
        }
        .compare-panel-title {
            font-size: 15px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }
        .compare-panel-title::before {
            content: ''; display: inline-block;
            width: 4px; height: 18px; border-radius: 2px;
            background: var(--blue);
        }
        .btn-close-compare {
            background: none; border: 1px solid var(--border);
            font-size: 12px; font-weight: 600; color: var(--muted);
            cursor: pointer; padding: 5px 12px; border-radius: 6px;
            font-family: inherit; transition: all .18s;
        }
        .btn-close-compare:hover { background: var(--bg); color: var(--text); }

        .compare-scroll { overflow-x: auto; }

        /* Product header row */
        .compare-product-header { display: grid; border-bottom: 2px solid var(--border); }
        .cph-label-cell {
            background: var(--bg); border-right: 2px solid var(--border);
            padding: 16px 14px; display: flex; align-items: center;
            font-size: 11px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: .5px; min-width: 120px;
        }
        .cph-product-cell {
            padding: 16px 14px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; text-align: center; min-width: 160px;
        }
        .cph-product-cell:last-child { border-right: none; }
        .cph-img {
            width: 88px; height: 88px; object-fit: cover;
            border-radius: 8px; border: 1px solid var(--border);
            background: var(--blue-lt);
        }
        .cph-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; }
        .cph-price { font-size: 16px; font-weight: 700; color: var(--blue); font-family: 'Cormorant Garamond', serif; }
        .cph-id { font-size: 11px; color: var(--muted); }

        /* Specs rows */
        .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .compare-table tbody td {
            padding: 11px 14px; border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            color: var(--text-2); vertical-align: middle;
        }
        .compare-table tbody td:last-child { border-right: none; }
        .compare-table tbody tr:last-child td { border-bottom: none; }
        .compare-table tbody tr:nth-child(even) td { background: var(--bg); }
        .compare-table tbody tr:hover td { background: var(--blue-lt); }
        .compare-table .row-label {
            font-weight: 700; color: var(--muted);
            background: var(--bg) !important;
            border-right: 2px solid var(--border) !important;
            font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
            min-width: 120px; white-space: nowrap;
        }
        .compare-table tbody tr:hover .row-label { background: var(--blue-lt) !important; }

        /* ── GRID ── */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(235px,100%), 1fr));
            gap: 22px;
        }

        /* ── CARD ── */
        .card {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            transition: transform .22s, box-shadow .22s, border-color .22s;
            animation: cardUp .4s ease both;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--blue-mid); }
        .card.selected { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,119,187,.12); }

        @keyframes cardUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-img-wrap {
            position: relative; width: 100%; height: 170px;
            overflow: hidden; background: var(--blue-lt);
            flex-shrink: 0;
        }
        .card-img-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.22) 0%, transparent 55%);
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform .45s; display: block; }
        .card:hover .card-img { transform: scale(1.06); }

        .card-selected-badge {
            position: absolute; top: 10px; right: 10px; z-index: 2;
            background: var(--blue); color: #fff;
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 999px;
            box-shadow: 0 2px 8px rgba(0,119,187,.4);
        }
        .card-type-badge {
            position: absolute; bottom: 10px; left: 10px; z-index: 2;
            background: rgba(255,255,255,.90); color: var(--blue-dk);
            font-size: 11px; font-weight: 700;
            padding: 3px 9px; border-radius: 6px;
            backdrop-filter: blur(4px);
        }

        .card-body { padding: 15px 16px 16px; display: flex; flex-direction: column; flex: 1; }

        .card-title {
            font-size: 14px; font-weight: 600;
            color: var(--text); line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; min-height: 41px; margin-bottom: 7px;
        }

        .card-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 19px; font-weight: 700;
            color: var(--blue); margin-bottom: 10px;
        }

        .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 13px; flex: 1; }

        .tag {
            font-size: 11px; font-weight: 500;
            background: var(--blue-lt); color: var(--blue-dk);
            padding: 3px 9px; border-radius: 999px;
            border: 1px solid var(--blue-mid);
        }

        .btn-select {
            width: 100%; padding: 9px;
            border: 1.5px solid var(--border); border-radius: 8px;
            background: var(--bg); color: var(--muted);
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .18s; font-family: inherit;
        }
        .btn-select:hover { background: var(--blue-lt); color: var(--blue-dk); border-color: var(--blue); }
        .btn-select.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        /* ── SKELETON ── */
        .skeleton { animation: shimmer 1.3s infinite; }
        @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.7} }
        .sk-img  { width:100%; height:170px; background:var(--border); }
        .sk-line { height:12px; background:var(--border); border-radius:4px; margin-bottom:8px; }
        .sk-line.w60 { width:60%; }
        .sk-line.w80 { width:80%; }
        .sk-btn  { height:34px; background:var(--border); border-radius:8px; margin-top:12px; }

        /* ── EMPTY ── */
        .state-empty {
            grid-column: 1/-1; text-align: center;
            padding: 60px 20px; color: var(--muted);
        }
        .state-empty .icon { font-size: 40px; margin-bottom: 14px; }

        /* ── FLOAT BAR ── */
        .float-bar {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--white);
            border: 2px solid var(--blue);
            border-radius: 999px;
            padding: 11px 24px;
            display: flex; align-items: center; gap: 14px;
            box-shadow: 0 8px 40px rgba(0,119,187,.20);
            transition: transform .32s cubic-bezier(.34,1.56,.64,1);
            z-index: 9999; white-space: nowrap;
        }
        .float-bar.visible { transform: translateX(-50%) translateY(0); }

        .float-text { font-size: 13px; color: var(--muted); }
        .float-text strong { color: var(--blue); font-weight: 700; font-size: 15px; }

        .float-compare-btn {
            background: var(--blue); color: #fff;
            border: none; padding: 9px 20px; border-radius: 999px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: background .18s;
            box-shadow: 0 3px 12px rgba(0,119,187,.3);
        }
        .float-compare-btn:hover { background: var(--blue-dk); }

        .float-clear-btn {
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 13px; font-family: inherit;
            padding: 4px 8px; border-radius: 6px; transition: all .18s;
        }
        .float-clear-btn:hover { color: #ef4444; background: #fef2f2; }

        /* ── TOAST ── */
        #nks-toast {
            position: fixed; bottom: 88px; left: 50%;
            transform: translateX(-50%);
            background: var(--text); color: #fff;
            padding: 10px 20px; border-radius: 999px;
            font-size: 13px; z-index: 9999;
            opacity: 0; transition: opacity .25s; pointer-events: none;
            white-space: nowrap;
        }
        #nks-toast.show { opacity: 1; }

        /* ── PAGINATION ── */
        .pagination {
            display: flex; align-items: center; justify-content: center;
            gap: 6px; margin-top: 36px; flex-wrap: wrap;
        }
        .page-btn {
            min-width: 36px; height: 36px; padding: 0 10px;
            border: 1.5px solid var(--border); border-radius: 8px;
            background: var(--white); color: var(--text-2);
            font-size: 13px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all .18s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
        .page-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        .page-btn:disabled { opacity: .35; cursor: default; }
        .page-info { font-size: 13px; color: var(--muted); padding: 0 8px; }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .toolbar { gap: 8px; }
            .search-wrap { max-width: 100%; }
            .filter-select { min-width: 110px; }
            .float-bar { border-radius: 16px; padding: 12px 16px; gap: 10px; flex-wrap: wrap; justify-content: center; width: calc(100% - 24px); bottom: 12px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-inner">
        <a class="logo" href="#">
            <div class="logo-mark">N</div>
            <div>
                <div class="logo-name">NKS Property</div>
                <div class="logo-sub">Hệ thống Đối Chiếu Bất Động Sản</div>
            </div>
        </a>
        <div class="header-right">
            <div class="status-pill">
                <div class="status-dot loading" id="statusDot"></div>
                <span id="statusText">Đang tải...</span>
            </div>
            <button class="btn btn-ghost" onclick="fetchProperties()" id="syncBtn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Đồng bộ
            </button>
            <button class="btn btn-compare" id="compareBtn" style="display:none" onclick="scrollToCompare()">
                📊 So sánh <span class="compare-badge" id="compareCount">0</span>
            </button>
        </div>
    </div>
</header>

<main>
    <!-- COMPARE PANEL -->
    <div class="compare-panel" id="comparePanel">
        <div class="compare-panel-head">
            <div class="compare-panel-title">So sánh Bất Động Sản</div>
            <button class="btn-close-compare" onclick="closeCompare()">✕ Đóng</button>
        </div>
        <div class="compare-scroll">
            <div class="compare-product-header" id="compareProductHeader"></div>
            <table class="compare-table">
                <tbody id="compareBody"></tbody>
            </table>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchInput" class="search-input"
                   placeholder="Tìm kiếm BĐS, địa chỉ..." oninput="applyFilter()">
        </div>
        <select id="filterType" class="filter-select" onchange="applyFilter()">
            <option value="">Tất cả loại</option>
        </select>
        <select id="sortBy" class="filter-select" onchange="applyFilter()">
            <option value="">Sắp xếp</option>
            <option value="price-asc">Giá tăng dần</option>
            <option value="price-desc">Giá giảm dần</option>
            <option value="area-asc">Diện tích tăng</option>
            <option value="area-desc">Diện tích giảm</option>
        </select>
        <span class="result-count" id="resultCount"></span>
    </div>

    <!-- GRID -->
    <div class="properties-grid" id="propertiesGrid"></div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>
</main>

<!-- FLOAT BAR -->
<div class="float-bar" id="floatBar">
    <span class="float-text">Đã chọn <strong id="floatCount">0</strong>/4 BĐS</span>
    <button class="float-compare-btn" onclick="scrollToCompare()">📊 So sánh ngay</button>
    <button class="float-clear-btn" onclick="clearSelection()">✕ Xóa</button>
</div>

<div id="nks-toast"></div>

<script>
    let allData   = [];
    let filtered  = [];
    let selected  = [];
    let currentPage = 1;
    const PAGE_SIZE = 12;

    const PROXY  = '/api/proxy';
    const NO_IMG = 'https://placehold.co/400x260/e8f4fd/0077bb?text=NKS+BDS';

    // ── Helpers ──────────────────────────────────────────────

    function imgUrl(url) {
        if (!url) return NO_IMG;
        return '/api/proxy?img=' + encodeURIComponent(url);
    }

    function setStatus(state, msg) {
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.className  = 'status-dot ' + (state === 'loading' ? 'loading' : state === 'error' ? 'error' : '');
        text.textContent = msg;
    }

    function showToast(msg) {
        const t = document.getElementById('nks-toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function updateCompareUI() {
        const n   = selected.length;
        const btn = document.getElementById('compareBtn');
        document.getElementById('compareCount').textContent = n;
        document.getElementById('floatCount').textContent   = n;
        btn.style.display = n > 0 ? 'inline-flex' : 'none';
        document.getElementById('floatBar').classList.toggle('visible', n > 0);
    }

    // ── Fetch ────────────────────────────────────────────────

    async function fetchProperties() {
        setStatus('loading', 'Đang đồng bộ...');
        document.getElementById('syncBtn').disabled = true;
        renderSkeleton();

        try {
            // FIX: dùng GET thay vì POST — đúng với REST API
            const res = await fetch(PROXY);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const json = await res.json();

            // Kiểm tra nếu proxy trả về lỗi dạng object
            if (json && json.error) throw new Error(json.error);

            // Chuẩn hóa cấu trúc
            let items = [];
            if (Array.isArray(json) && json.length)  items = json;
            else if (Array.isArray(json.data))        items = json.data;
            else if (Array.isArray(json.items))       items = json.items;
            else if (Array.isArray(json.List))        items = json.List;

            // Map field featureimg → featuring
            allData = items.map(i => ({
                ...i,
                featuring: i.featureimg || i.featuring || i.image || null
            }));

            // Build loại filter
            const types = [...new Set(allData.map(i => i.rstype).filter(Boolean))].sort();
            const sel   = document.getElementById('filterType');
            sel.innerHTML = '<option value="">Tất cả loại</option>'
                + types.map(t => `<option value="${t}">${t}</option>`).join('');

            setStatus('ok', `${allData.length} bất động sản`);
            applyFilter(); // applyFilter đã gọi renderPagination bên trong
        } catch (err) {
            setStatus('error', 'Lỗi kết nối');
            document.getElementById('propertiesGrid').innerHTML =
                `<div class="state-empty">
                    <div class="icon">⚠️</div>
                    <p style="color:#ef4444;font-weight:600">${err.message}</p>
                    <p style="margin-top:8px;font-size:13px">Kiểm tra endpoint <code>/api/proxy</code></p>
                </div>`;
        } finally {
            document.getElementById('syncBtn').disabled = false;
        }
    }

    // ── Filter & Sort ────────────────────────────────────────

    function applyFilter() {
        const q    = document.getElementById('searchInput').value.toLowerCase().trim();
        const type = document.getElementById('filterType').value;
        const sort = document.getElementById('sortBy').value;

        filtered = allData.filter(item => {
            const matchQ = !q || (item.title||'').toLowerCase().includes(q) || (item.address||'').toLowerCase().includes(q);
            const matchT = !type || item.rstype === type;
            return matchQ && matchT;
        });

        if (sort === 'price-asc')  filtered.sort((a,b) => (a.price||0) - (b.price||0));
        if (sort === 'price-desc') filtered.sort((a,b) => (b.price||0) - (a.price||0));
        if (sort === 'area-asc')   filtered.sort((a,b) => (a.total_area||0) - (b.total_area||0));
        if (sort === 'area-desc')  filtered.sort((a,b) => (b.total_area||0) - (a.total_area||0));

        currentPage = 1; // Reset về trang 1 khi filter thay đổi

        document.getElementById('resultCount').innerHTML =
            `Hiển thị <strong>${filtered.length}</strong> / ${allData.length} tin`;

        renderCards();
        renderPagination();
    }

    // ── Render ───────────────────────────────────────────────

    function renderSkeleton() {
        document.getElementById('propertiesGrid').innerHTML = Array(8).fill(0).map(() => `
            <div class="card skeleton">
                <div class="sk-img"></div>
                <div style="padding:15px 16px">
                    <div class="sk-line w80"></div>
                    <div class="sk-line w60"></div>
                    <div class="sk-btn"></div>
                </div>
            </div>`).join('');
    }

    function renderCards() {
        const grid = document.getElementById('propertiesGrid');

        if (!filtered.length) {
            grid.innerHTML = `<div class="state-empty"><div class="icon">🔍</div><p>Không tìm thấy kết quả phù hợp.</p></div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        // Cắt data theo trang
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filtered.slice(start, start + PAGE_SIZE);

        grid.innerHTML = pageItems.map((item, i) => {
            const on    = selected.includes(String(item.id));
            const img   = imgUrl(item.featuring);
            const price = item.formatedPrice || item.price_label || 'Liên hệ';
            const area  = item.total_area ? item.total_area + ' m²' : null;

            return `<div class="card${on?' selected':''}" style="animation-delay:${Math.min(i,15)*35}ms">
                <div class="card-img-wrap">
                    <img class="card-img" src="${img}" alt="${item.title||''}" loading="lazy"
                         onerror="this.onerror=null;this.src='${NO_IMG}'">
                    ${on ? '<span class="card-selected-badge">✓ Đã chọn</span>' : ''}
                    ${item.rstype ? `<span class="card-type-badge">${item.rstype}</span>` : ''}
                </div>
                <div class="card-body">
                    <div class="card-title">${item.title || 'Không có tiêu đề'}</div>
                    <div class="card-price">${price}</div>
                    <div class="card-meta">
                        ${area ? `<span class="tag">📐 ${area}</span>` : ''}
                        ${item.bed  ? `<span class="tag">🛏 ${item.bed} PN</span>` : ''}
                        ${item.bath ? `<span class="tag">🚿 ${item.bath} PT</span>` : ''}
                        ${item.direction ? `<span class="tag">🧭 ${item.direction}</span>` : ''}
                    </div>
                    <button class="btn-select${on?' active':''}" onclick="toggleSelect('${item.id}')">
                        ${on ? '✓ Bỏ chọn' : '+ So sánh'}
                    </button>
                </div>
            </div>`;
        }).join('');

        // Scroll lên đầu grid khi chuyển trang
        grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderPagination() {
        const total = Math.ceil(filtered.length / PAGE_SIZE);
        const pag   = document.getElementById('pagination');

        if (total <= 1) { pag.innerHTML = ''; return; }

        // Tạo dãy số trang với dấu "..."
        function getPages(cur, tot) {
            if (tot <= 7) return Array.from({length: tot}, (_, i) => i + 1);
            const pages = [];
            pages.push(1);
            if (cur > 3) pages.push('...');
            for (let i = Math.max(2, cur-1); i <= Math.min(tot-1, cur+1); i++) pages.push(i);
            if (cur < tot - 2) pages.push('...');
            pages.push(tot);
            return pages;
        }

        const pages = getPages(currentPage, total);

        pag.innerHTML = `
            <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Trước</button>
            ${pages.map(p => p === '...'
                ? `<span class="page-info">…</span>`
                : `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`
            ).join('')}
            <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>Sau ›</button>
        `;
    }

    function goPage(page) {
        const total = Math.ceil(filtered.length / PAGE_SIZE);
        if (page < 1 || page > total) return;
        currentPage = page;
        renderCards();
        renderPagination();
    }

    // ── Select ───────────────────────────────────────────────

    function toggleSelect(id) {
        id = String(id);
        const idx = selected.indexOf(id);
        if (idx > -1) {
            selected.splice(idx, 1);
        } else {
            if (selected.length >= 4) { showToast('Chỉ chọn tối đa 4 BĐS để so sánh!'); return; }
            selected.push(id);
        }
        updateCompareUI();
        renderCards();
        renderPagination();
    }

    function clearSelection() {
        selected = [];
        closeCompare();
        updateCompareUI();
        renderCards();
        renderPagination();
    }

    // ── Compare ──────────────────────────────────────────────

    function scrollToCompare() {
        buildCompareTable();
        const panel = document.getElementById('comparePanel');
        panel.classList.add('visible');
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeCompare() {
        document.getElementById('comparePanel').classList.remove('visible');
    }

    function buildCompareTable() {
        const items  = allData.filter(d => selected.includes(String(d.id)));
        const cols   = items.length;

        // ── Product header: label cell + 1 cell per product ──
        const headerStyle = `grid-template-columns: 120px repeat(${cols}, 1fr)`;
        document.getElementById('compareProductHeader').style = headerStyle;
        document.getElementById('compareProductHeader').innerHTML =
            `<div class="cph-label-cell">Sản phẩm</div>`
            + items.map(i => {
                const img   = imgUrl(i.featuring);
                const price = i.formatedPrice || i.price_label || 'Liên hệ';
                return `<div class="cph-product-cell">
                    <img class="cph-img" src="${img}" alt="${i.title||''}"
                         onerror="this.onerror=null;this.src='${NO_IMG}'">
                    <div class="cph-name">${i.title||'—'}</div>
                    <div class="cph-price">${price}</div>
                    <div class="cph-id">#${i.id}</div>
                </div>`;
            }).join('');

        // ── Specs rows ──
        const fields = [
            { l: 'Diện tích',  k: 'total_area',   fmt: v => v ? v + ' m²' : '—' },
            { l: 'Loại BĐS',   k: 'rstype' },
            { l: 'Phòng ngủ',  k: 'bed' },
            { l: 'Phòng tắm',  k: 'bath' },
            { l: 'Hướng',      k: 'direction' },
            { l: 'Địa chỉ',    k: 'address' },
            { l: 'Điện thoại', k: 'phone' },
        ];

        document.getElementById('compareBody').innerHTML =
            fields.map(f => `<tr>
                <td class="row-label">${f.l}</td>
                ${items.map(i => {
                    const val = i[f.k];
                    const display = f.fmt ? f.fmt(val) : (val || '—');
                    return `<td>${display}</td>`;
                }).join('')}
            </tr>`).join('');
    }

    // ── Init ─────────────────────────────────────────────────
    fetchProperties();
</script>
</body>
</html>
