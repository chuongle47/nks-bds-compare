<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản — NKS Property</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue:    #0077bb;
            --blue-dk: #005a8e;
            --blue-lt: #e8f4fd;
            --blue-mid:#cce4f6;
            --gold:    #c9993a;
            --text:    #0d1b2a;
            --text-2:  #2d4157;
            --muted:   #64748b;
            --border:  #dde6ee;
            --bg:      #f5f8fb;
            --white:   #ffffff;
            --green:   #16a34a;
            --red:     #ef4444;
            --r:       12px;
            --shadow:  0 2px 12px rgba(0,119,187,.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,.10);
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1100px; margin: auto;
            padding: 0 clamp(16px,4vw,40px);
            height: 60px; display: flex; align-items: center; gap: 14px;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-mark {
            width: 34px; height: 34px; border-radius: 8px;
            background: var(--blue);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px; font-weight: 700; color: #fff;
        }
        .logo-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 16px; border-radius: 8px;
            font-family: inherit; font-size: 13px; font-weight: 600;
            cursor: pointer; border: none; transition: all .18s; text-decoration: none;
        }
        .btn-ghost { background: var(--white); color: var(--text-2); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
        .btn-danger { background: var(--white); color: #b45309; border: 1px solid #fcd34d; }
        .btn-danger:hover { background: #fffbeb; }

        /* ── LAYOUT ── */
        .page { max-width: 1100px; margin: auto; padding: clamp(20px,4vw,40px) clamp(16px,4vw,40px); display: grid; grid-template-columns: 260px 1fr; gap: 28px; }
        @media (max-width: 768px) { .page { grid-template-columns: 1fr; } }

        /* ── SIDEBAR ── */
        .sidebar { display: flex; flex-direction: column; gap: 16px; }
        .profile-card {
            background: var(--white); border: 1.5px solid var(--border);
            border-radius: var(--r); padding: 24px 20px; text-align: center;
            box-shadow: var(--shadow);
        }
        .avatar-wrap {
            position: relative; width: 80px; height: 80px;
            border-radius: 50%; margin: 0 auto 12px;
            cursor: pointer; overflow: hidden;
            border: 3px solid var(--blue-mid);
        }
        .avatar-wrap img, .avatar-wrap .avatar-initial {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 50%;
        }
        .avatar-initial {
            display: grid; place-items: center;
            background: var(--blue); color: #fff;
            font-size: 28px; font-weight: 700;
        }
        .avatar-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .18s;
            color: #fff; font-size: 11px; font-weight: 700;
        }
        .avatar-wrap:hover .avatar-overlay { opacity: 1; }
        #avatarFileInput { display: none; }
        .profile-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .profile-username { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
        .profile-email { font-size: 12px; color: var(--muted); }

        .nav-menu { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 18px; font-size: 13px; font-weight: 600;
            color: var(--text-2); cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .16s; user-select: none;
            border-bottom: 1px solid var(--border);
        }
        .nav-item:last-child { border-bottom: none; }
        .nav-item:hover { background: var(--blue-lt); color: var(--blue); }
        .nav-item.active { background: var(--blue-lt); color: var(--blue); border-left-color: var(--blue); }
        .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── MAIN CONTENT ── */
        .content { display: flex; flex-direction: column; gap: 20px; }
        .section-panel {
            background: var(--white); border: 1.5px solid var(--border);
            border-radius: var(--r); box-shadow: var(--shadow);
            display: none;
        }
        .section-panel.active { display: block; }
        .panel-head {
            padding: 18px 24px; border-bottom: 1.5px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .panel-head h2 { font-size: 16px; font-weight: 700; color: var(--text); }
        .panel-head .panel-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--blue-lt); display: grid; place-items: center;
            color: var(--blue);
        }
        .panel-head .panel-icon svg { width: 16px; height: 16px; }
        .panel-body { padding: 24px; }

        /* ── FORM ── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 13px; font-weight: 700; color: var(--text-2); }
        .input {
            height: 42px; border: 1.5px solid var(--border);
            border-radius: 8px; padding: 0 12px;
            font: inherit; font-size: 13px; color: var(--text);
            background: var(--bg); outline: none; transition: all .18s;
        }
        .input:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 3px rgba(0,119,187,.10); }
        .input:disabled { opacity: .55; cursor: not-allowed; }
        select.input { cursor: pointer; }

        .form-actions { margin-top: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .btn-primary {
            background: var(--blue); color: #fff; padding: 10px 24px;
            border-radius: 8px; font: inherit; font-size: 13px; font-weight: 700;
            cursor: pointer; border: none; transition: all .18s;
        }
        .btn-primary:hover { background: var(--blue-dk); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,119,187,.3); }
        .btn-primary:disabled { opacity: .6; cursor: default; transform: none; }
        .btn-secondary {
            background: var(--white); color: var(--text-2);
            border: 1.5px solid var(--border); padding: 10px 20px;
            border-radius: 8px; font: inherit; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .18s;
        }
        .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

        /* Alert */
        .alert {
            padding: 10px 14px; border-radius: 8px; font-size: 13px;
            margin-top: 14px; display: none; align-items: center; gap: 8px;
        }
        .alert.show { display: flex; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .alert-error   { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }

        /* CCCD preview */
        .cccd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
        @media (max-width: 500px) { .cccd-grid { grid-template-columns: 1fr; } }
        .cccd-upload {
            border: 2px dashed var(--border); border-radius: 8px;
            padding: 20px; text-align: center; cursor: pointer;
            transition: all .18s; background: var(--bg);
        }
        .cccd-upload:hover { border-color: var(--blue); background: var(--blue-lt); }
        .cccd-upload img { width: 100%; max-height: 120px; object-fit: contain; border-radius: 6px; display: none; }
        .cccd-upload .cccd-label { font-size: 12px; color: var(--muted); margin-top: 8px; }
        .cccd-upload input[type="file"] { display: none; }

        /* Password strength */
        .pass-strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all .3s; background: var(--border); }
        .pass-strength.weak   { background: var(--red); width: 33%; }
        .pass-strength.medium { background: var(--gold); width: 66%; }
        .pass-strength.strong { background: var(--green); width: 100%; }

        /* Loading skeleton */
        .skeleton { animation: shimmer 1.3s infinite; }
        @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.8} }
        .sk-line { height: 12px; background: var(--border); border-radius: 4px; margin-bottom: 10px; }
        .sk-line.w50 { width: 50%; }
        .sk-line.w80 { width: 80%; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-inner">
        <a class="logo" href="index.html">
            <div class="logo-mark">N</div>
            <div class="logo-name">NKS Property</div>
        </a>
        <div class="header-right">
            <a class="btn btn-ghost" href="index.html">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Trang chủ
            </a>
            <button class="btn btn-danger" onclick="logout()">Đăng xuất</button>
        </div>
    </div>
</header>

<!-- PAGE -->
<div class="page">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="profile-card">
            <div class="avatar-wrap" onclick="document.getElementById('avatarFileInput').click()" title="Đổi ảnh đại diện">
                <img id="profileAvatarImg" src="" alt="" style="display:none">
                <div class="avatar-initial" id="profileAvatarInitial">?</div>
                <div class="avatar-overlay">📷 Đổi ảnh</div>
            </div>
            <input type="file" id="avatarFileInput" accept="image/*">
            <div class="profile-name" id="profileName">Đang tải...</div>
            <div class="profile-username" id="profileUsername"></div>
            <div class="profile-email" id="profileEmail"></div>
        </div>

        <nav class="nav-menu">
            <div class="nav-item active" onclick="showSection('info')" data-section="info">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                Thông tin cá nhân
            </div>
            <div class="nav-item" onclick="showSection('password')" data-section="password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                Đổi mật khẩu
            </div>
            <div class="nav-item" onclick="showSection('cccd')" data-section="cccd">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M6 9h4M6 13h8M6 17h5"/></svg>
                CCCD / CMND
            </div>
        </nav>
    </aside>

    <!-- CONTENT -->
    <div class="content">

        <!-- THÔNG TIN CÁ NHÂN -->
        <div class="section-panel active" id="section-info">
            <div class="panel-head">
                <div class="panel-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </div>
                <h2>Thông tin cá nhân</h2>
            </div>
            <div class="panel-body">
                <div id="infoLoadingSkeleton">
                    <div class="sk-line skeleton w80"></div>
                    <div class="sk-line skeleton w50"></div>
                    <div class="sk-line skeleton w80"></div>
                </div>
                <form id="infoForm" style="display:none" onsubmit="submitUpdateInfo(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Họ</label>
                            <input class="input" type="text" id="infoFirstname" placeholder="Nguyễn Văn">
                        </div>
                        <div class="form-group">
                            <label>Tên</label>
                            <input class="input" type="text" id="infoLastname" placeholder="A">
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input class="input" type="tel" id="infoPhone" placeholder="0901234567">
                        </div>
                        <div class="form-group">
                            <label>Email <span style="color:var(--muted);font-weight:400">(không thể đổi tại đây)</span></label>
                            <input class="input" type="email" id="infoEmail" placeholder="email@example.com" disabled>
                        </div>
                        <div class="form-group">
                            <label>Giới tính</label>
                            <select class="input" id="infoGender">
                                <option value="">— Không xác định —</option>
                                <option value="0">Nam</option>
                                <option value="1">Nữ</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ngày sinh</label>
                            <input class="input" type="date" id="infoDob">
                        </div>
                        <div class="form-group">
                            <label>Nơi sinh</label>
                            <input class="input" type="text" id="infoPob" placeholder="Hà Nội">
                        </div>
                        <div class="form-group">
                            <label>Website</label>
                            <input class="input" type="text" id="infoWebsite" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label>Tỉnh / Thành phố</label>
                            <select class="input" id="infoProvince">
                                <option value="">— Chọn tỉnh —</option>
                            </select>
                        </div>
                        <div class="form-group full">
                            <label>Giới thiệu</label>
                            <input class="input" type="text" id="infoIntro" placeholder="Vài dòng giới thiệu bản thân...">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-primary" type="submit" id="infoSubmitBtn">Lưu thay đổi</button>
                    </div>
                    <div class="alert" id="infoAlert"></div>
                </form>
            </div>
        </div>

        <!-- ĐỔI MẬT KHẨU -->
        <div class="section-panel" id="section-password">
            <div class="panel-head">
                <div class="panel-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                </div>
                <h2>Đổi mật khẩu</h2>
            </div>
            <div class="panel-body">
                <form id="passwordForm" onsubmit="submitChangePassword(event)">
                    <div class="form-grid">
                        <div class="form-group full">
                            <label>Mật khẩu hiện tại</label>
                            <input class="input" type="password" id="passOld" placeholder="Nhập mật khẩu cũ" required>
                        </div>
                        <div class="form-group">
                            <label>Mật khẩu mới</label>
                            <input class="input" type="password" id="passNew" placeholder="Tối thiểu 8 ký tự"
                                   required oninput="checkPassStrength(this.value)">
                            <div class="pass-strength" id="passStrengthBar"></div>
                        </div>
                        <div class="form-group">
                            <label>Xác nhận mật khẩu mới</label>
                            <input class="input" type="password" id="passConfirm" placeholder="Nhập lại mật khẩu mới" required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-primary" type="submit" id="passSubmitBtn">Đổi mật khẩu</button>
                    </div>
                    <div class="alert" id="passAlert"></div>
                </form>
            </div>
        </div>

        <!-- CCCD / CMND -->
        <div class="section-panel" id="section-cccd">
            <div class="panel-head">
                <div class="panel-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M6 9h4M6 13h8M6 17h5"/></svg>
                </div>
                <h2>CCCD / CMND</h2>
            </div>
            <div class="panel-body">
                <form id="cccdForm" onsubmit="submitCccd(event)">
                    <div class="form-grid" style="margin-bottom:16px">
                        <div class="form-group">
                            <label>Số CCCD / CMND</label>
                            <input class="input" type="text" id="cccdNumber" placeholder="012345678912" maxlength="12">
                        </div>
                        <div class="form-group">
                            <label>Ngày cấp</label>
                            <input class="input" type="date" id="cccdDate">
                        </div>
                        <div class="form-group full">
                            <label>Nơi cấp</label>
                            <input class="input" type="text" id="cccdPlace" placeholder="Cục Cảnh sát QLHC về TTXH">
                        </div>
                    </div>
                    <div class="cccd-grid">
                        <div>
                            <p style="font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:8px">Mặt trước</p>
                            <label class="cccd-upload" for="cccdFrontInput">
                                <img id="cccdFrontPreview" alt="Mặt trước">
                                <div class="cccd-label" id="cccdFrontLabel">📎 Chọn ảnh mặt trước</div>
                                <input type="file" id="cccdFrontInput" accept="image/*" onchange="previewCccd(this,'front')">
                            </label>
                        </div>
                        <div>
                            <p style="font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:8px">Mặt sau</p>
                            <label class="cccd-upload" for="cccdBackInput">
                                <img id="cccdBackPreview" alt="Mặt sau">
                                <div class="cccd-label" id="cccdBackLabel">📎 Chọn ảnh mặt sau</div>
                                <input type="file" id="cccdBackInput" accept="image/*" onchange="previewCccd(this,'back')">
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-primary" type="submit" id="cccdSubmitBtn">Cập nhật CCCD</button>
                    </div>
                    <div class="alert" id="cccdAlert"></div>
                </form>
            </div>
        </div>

    </div>
</div>

<script>
    const AUTH_KEY = 'nks-auth-session';
    const API      = '/api/nks-account';

    // ── Auth ─────────────────────────────────────────────────────────────────

    function getSession() {
        try { return JSON.parse(sessionStorage.getItem(AUTH_KEY)) || null; }
        catch { return null; }
    }

    function requireAuth() {
        if (getSession()?.access_token) return true;
        window.location.replace('login.html');
        return false;
    }

    function logout() {
        const session = getSession();
        if (session?.access_token) {
            // Gọi API logout (action mới trong v2.2)
            fetch(API, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ action: 'logout', access_token: session.access_token }),
            }).catch(() => {}); // Không cần chờ kết quả
        }
        sessionStorage.removeItem(AUTH_KEY);
        window.location.replace('login.html');
    }

    // ── API helper ───────────────────────────────────────────────────────────

    async function nksApi(action, params = {}) {
        const session = getSession();
        const body    = { action, access_token: session?.access_token || '', ...params };
        const res     = await fetch(API, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(body),
        });
        return res.json();
    }

    // ── Alert helper ─────────────────────────────────────────────────────────

    function showAlert(id, type, msg) {
        const el = document.getElementById(id);
        el.className = `alert alert-${type} show`;
        el.textContent = msg;
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    // ── Navigation ───────────────────────────────────────────────────────────

    function showSection(name) {
        document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        document.querySelector(`[data-section="${name}"]`).classList.add('active');
    }

    // ── Load user info ───────────────────────────────────────────────────────

    async function loadUserInfo() {
        try {
            const res = await nksApi('get_user');
            console.log('[get_user] response:', res);

            if (res.success === false) throw new Error(res.message || 'Không lấy được thông tin tài khoản');

            // API thật bọc data trong field "data" — fallback về res nếu API thay đổi cấu trúc
            const data = res.data ?? res;

            document.getElementById('infoLoadingSkeleton').style.display = 'none';
            document.getElementById('infoForm').style.display = 'block';

            // Sidebar profile — field hiển thị tên là "name" (do GET trả gộp),
            // nhưng khi UPDATE phải tách firstname/lastname theo spec API
            const session  = getSession();
            const name     = data.name || [data.firstname, data.lastname].filter(Boolean).join(' ') || session?.username || 'Người dùng';
            const username = session?.username || '';

            document.getElementById('profileName').textContent     = name;
            document.getElementById('profileUsername').textContent = username ? '@' + username : '';
            document.getElementById('profileEmail').textContent    = data.email || '';

            // Avatar
            if (data.avatar) {
                const img = document.getElementById('profileAvatarImg');
                img.src = data.avatar; img.style.display = 'block';
                document.getElementById('profileAvatarInitial').style.display = 'none';
            } else {
                document.getElementById('profileAvatarInitial').style.display = 'flex';
                document.getElementById('profileAvatarInitial').textContent = name.charAt(0).toUpperCase();
            }

            // Cập nhật session với data mới nhất
            if (session) {
                session.name   = name;
                session.avatar = data.avatar || '';
                session.email  = data.email || session.email || '';
                sessionStorage.setItem(AUTH_KEY, JSON.stringify(session));
            }

            // Fill form — field thật theo tài liệu API: firstname, lastname, phone,
            // gender, dob, pob, website, intro, province (KHÔNG có name/email/address gộp)
            document.getElementById('infoFirstname').value = data.firstname || '';
            document.getElementById('infoLastname').value  = data.lastname  || '';
            document.getElementById('infoPhone').value     = data.phone     || '';
            document.getElementById('infoEmail').value     = data.email     || ''; // chỉ hiển thị, disabled
            document.getElementById('infoGender').value    = (data.gender ?? '') === null ? '' : String(data.gender ?? '');
            document.getElementById('infoDob').value       = data.formatedDob || data.dob || '';
            document.getElementById('infoPob').value       = data.pob      || '';
            document.getElementById('infoWebsite').value   = data.website  || '';
            document.getElementById('infoIntro').value      = data.intro    || '';

            // Province — field đơn theo spec API (không có district/ward riêng cho updateInfo)
            await loadProvinces(data.province || data.add_province);

            // Prefill CCCD nếu đã có sẵn — lưu ý GET trả id_number/id_date/id_place,
            // nhưng khi UPDATE (updateCccd) phải gửi number/date/place
            if (data.id_number) document.getElementById('cccdNumber').value = data.id_number;
            if (data.id_date)   document.getElementById('cccdDate').value   = data.id_date;
            if (data.id_place)  document.getElementById('cccdPlace').value  = data.id_place;
            if (data.cccd_front) {
                const img = document.getElementById('cccdFrontPreview');
                img.src = data.cccd_front; img.style.display = 'block';
                document.getElementById('cccdFrontLabel').textContent = '✓ Đã có ảnh (chọn để thay)';
            }
            if (data.cccd_back) {
                const img = document.getElementById('cccdBackPreview');
                img.src = data.cccd_back; img.style.display = 'block';
                document.getElementById('cccdBackLabel').textContent = '✓ Đã có ảnh (chọn để thay)';
            }

        } catch (err) {
            document.getElementById('infoLoadingSkeleton').innerHTML =
                `<p style="color:var(--red);font-size:13px">⚠️ Không tải được thông tin: ${err.message}</p>`;
        }
    }

    // ── Provinces ────────────────────────────────────────────────────────────
    // API thật (theo tài liệu): chỉ có 1 field "province" trong updateInfo —
    // không có district/ward riêng cho hồ sơ user.
    let addressTree = []; // cache để tránh gọi lại API


    async function loadProvinces(savedProvince) {
        try {
            const res = await nksApi('get_provinces');
            console.log('[get_provinces] response:', res);
            if (res.success === false) throw new Error(res.message || 'Không tải được danh sách tỉnh/thành');

            addressTree = Array.isArray(res) ? res : (res.data || []);

            const sel = document.getElementById('infoProvince');
            sel.innerHTML = '<option value="">— Chọn tỉnh —</option>'
                + addressTree.map(p => `<option value="${p.id}"${p.id == savedProvince ? ' selected' : ''}>${p.title}</option>`).join('');
        } catch (err) {
            console.warn('[get_provinces] failed:', err.message);
        }
    }

    // ── Submit: update info ──────────────────────────────────────────────────

    async function submitUpdateInfo(e) {
        e.preventDefault();
        const btn = document.getElementById('infoSubmitBtn');
        btn.disabled = true; btn.textContent = 'Đang lưu...';
        try {
            // Field thật theo tài liệu API updateInfo — KHÔNG có email/address gộp
            const params = {
                firstname: document.getElementById('infoFirstname').value.trim(),
                lastname:  document.getElementById('infoLastname').value.trim(),
                phone:     document.getElementById('infoPhone').value.trim(),
                gender:    document.getElementById('infoGender').value,
                website:   document.getElementById('infoWebsite').value.trim(),
                dob:       document.getElementById('infoDob').value, // yyyy-mm-dd
                pob:       document.getElementById('infoPob').value.trim(),
                intro:     document.getElementById('infoIntro').value.trim(),
                province:  document.getElementById('infoProvince').value,
            };
            const data = await nksApi('update_info', params);
            console.log('[update_info] sent:', params, '→ response:', data);
            if (data.success === false) throw new Error(data.message || 'Cập nhật thất bại');
            showAlert('infoAlert', 'success', '✅ Cập nhật thông tin thành công!');
            await loadUserInfo(); // Reload để cập nhật sidebar
        } catch (err) {
            showAlert('infoAlert', 'error', '❌ ' + err.message);
        } finally {
            btn.disabled = false; btn.textContent = 'Lưu thay đổi';
        }
    }

    // ── Submit: change password ──────────────────────────────────────────────

    async function submitChangePassword(e) {
        e.preventDefault();
        const newPass     = document.getElementById('passNew').value;
        const confirmPass = document.getElementById('passConfirm').value;
        if (newPass !== confirmPass) { showAlert('passAlert', 'error', '❌ Mật khẩu xác nhận không khớp!'); return; }
        if (newPass.length < 8)      { showAlert('passAlert', 'error', '❌ Mật khẩu mới phải có ít nhất 8 ký tự!'); return; }

        const btn = document.getElementById('passSubmitBtn');
        btn.disabled = true; btn.textContent = 'Đang đổi...';
        try {
            // Field thật theo tài liệu API: old_password, password (KHÔNG phải new_password)
            const data = await nksApi('update_password', {
                old_password: document.getElementById('passOld').value,
                password:     newPass,
            });
            console.log('[update_password] response:', data);
            if (data.success === false) throw new Error(data.message || 'Đổi mật khẩu thất bại');
            showAlert('passAlert', 'success', '✅ Đổi mật khẩu thành công!');
            document.getElementById('passwordForm').reset();
            document.getElementById('passStrengthBar').className = 'pass-strength';
        } catch (err) {
            showAlert('passAlert', 'error', '❌ ' + err.message);
        } finally {
            btn.disabled = false; btn.textContent = 'Đổi mật khẩu';
        }
    }

    // ── Password strength ────────────────────────────────────────────────────

    function checkPassStrength(val) {
        const bar = document.getElementById('passStrengthBar');
        if (!val) { bar.className = 'pass-strength'; return; }
        const strong = val.length >= 10 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val);
        const medium = val.length >= 8  && (/[A-Z]/.test(val) || /[0-9]/.test(val));
        bar.className = 'pass-strength ' + (strong ? 'strong' : medium ? 'medium' : 'weak');
    }

    // ── Avatar upload ────────────────────────────────────────────────────────

    document.getElementById('avatarFileInput').addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert('Ảnh phải nhỏ hơn 2MB'); return; }

        // Resize & convert to base64
        const base64 = await fileToBase64(file);
        try {
            const res = await nksApi('update_avatar', { avatar: base64 });
            console.log('[update_avatar] response:', res);
            if (res.success === false) throw new Error(res.message || 'Cập nhật avatar thất bại');
            const newAvatar = res.data?.avatar || res.avatar || base64;
            // Update preview
            const img = document.getElementById('profileAvatarImg');
            img.src = newAvatar; img.style.display = 'block';
            document.getElementById('profileAvatarInitial').style.display = 'none';
            // Cập nhật session
            const session = getSession();
            if (session) { session.avatar = newAvatar; sessionStorage.setItem(AUTH_KEY, JSON.stringify(session)); }
            showAlert('infoAlert', 'success', '✅ Đã cập nhật ảnh đại diện!');
        } catch (err) {
            alert('❌ ' + err.message);
        }
    });

    // ── CCCD ─────────────────────────────────────────────────────────────────

    function previewCccd(input, side) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const preview = document.getElementById(`cccd${side.charAt(0).toUpperCase() + side.slice(1)}Preview`);
            const label   = document.getElementById(`cccd${side.charAt(0).toUpperCase() + side.slice(1)}Label`);
            preview.src = e.target.result;
            preview.style.display = 'block';
            label.textContent = '✓ Đã chọn ảnh';
        };
        reader.readAsDataURL(file);
    }

    async function submitCccd(e) {
        e.preventDefault();
        const frontFile = document.getElementById('cccdFrontInput').files[0];
        const backFile  = document.getElementById('cccdBackInput').files[0];
        const idNumber  = document.getElementById('cccdNumber').value.trim();
        const idDate    = document.getElementById('cccdDate').value;
        const idPlace   = document.getElementById('cccdPlace').value.trim();

        if (!idNumber && !idDate && !idPlace && !frontFile && !backFile) {
            showAlert('cccdAlert', 'error', '❌ Vui lòng nhập thông tin hoặc chọn ảnh!');
            return;
        }

        const btn = document.getElementById('cccdSubmitBtn');
        btn.disabled = true; btn.textContent = 'Đang tải lên...';
        try {
            // Field thật theo tài liệu API updateCccd: number, date, place, front, back
            // (KHÔNG phải id_number/cccd_number — đó là tên field ở response GET)
            const params = {};
            if (idNumber)  params.number = idNumber;
            if (idDate)    params.date   = idDate;
            if (idPlace)   params.place  = idPlace;
            if (frontFile) params.front  = await fileToBase64(frontFile);
            if (backFile)  params.back   = await fileToBase64(backFile);

            const data = await nksApi('update_cccd', params);
            console.log('[update_cccd] sent:', Object.keys(params), '→ response:', data);
            if (data.success === false) throw new Error(data.message || 'Cập nhật CCCD thất bại');
            showAlert('cccdAlert', 'success', '✅ Đã cập nhật CCCD thành công!');
        } catch (err) {
            showAlert('cccdAlert', 'error', '❌ ' + err.message);
        } finally {
            btn.disabled = false; btn.textContent = 'Cập nhật CCCD';
        }
    }

    // ── Utils ─────────────────────────────────────────────────────────────────

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload  = () => resolve(reader.result.split(',')[1]); // strip data:...;base64,
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    if (requireAuth()) {
        loadUserInfo();
    }
</script>
</body>
</html>
